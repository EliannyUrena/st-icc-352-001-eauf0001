<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo}">Listar Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>

    <nav class="navbar navbar-light bg-light border-bottom">
        <div class="container">

            <ul class="nav nav-underline ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/">
                        Comprar
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/crudProductos/listarVentas" th:if="${usuario != null and usuario.usuario == 'admin'}">
                        Ventas Realizadas
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/" th:if="${usuario != null and usuario.usuario == 'admin'}">
                        Administrar Productos
                    </a>
                </li>


                <li class="nav-item" >
                    <a class="nav-link" href="/carroCompra/ver">
                        Carrito (<span th:text="${cantidad}"></span>)
                    </a>
                </li>

                <li class="nav-item" th:if="${usuario == null}">
                    <a class="nav-link" href="/login">
                        Iniciar Sesión
                    </a>
                </li>

                <li class="nav-item" th:if="${usuario != null}">
                    <a class="nav-link text-danger" href="/logout">
                        Cerrar Sesión
                    </a>
                </li>
            </ul>

        </div>
    </nav>

    <div class="container">
        <div class="py-5 text-center border-bottom">
            <h2 class=" fst-italic fw-bold">Listado de productos</h2>
        </div>

        <a th:if="${usuario != null and usuario.usuario == 'admin'}" href="/crudProductos/crear" class="btn btn-primary">Nuevo Producto</a>

        <table class="table table-striped shadow">

            <thead>
            <tr>
                <th scope="col">Id</th>
                <th scope="col">Producto</th>
                <th scope="col">Precio</th>
                <th scope="col">Cantidad</th>
                <th scope="col">Acciones</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="producto : ${listaProductos}">

                <td th:text="${producto.id}"></td>

                <td>
                        <a  th:href="'/visualizarProductos/'+${producto.id}"
                            th:text="${producto.nombre}"
                            class="text-dark">
                        </a>
                </td>
                <td th:text="${producto.precio}">Precio</td>

                <td style="width: 120px;">

                    <form id="agregar" method="post" th:action="'/carroCompra/agregar/'+${producto.id}" class="d-flex align-items-center gap-2">
                        <input type="number" name="cantidad" min="0" value="1" class="form-control text-center col-auto">

                    </form>

                </td>

                <td>
                    <button form="agregar" type="submit" class="btn btn-success mb-1">Agregar</button>

                    <a th:text="Editar" th:if="${usuario != null and usuario.usuario == 'admin'}" th:href="'/crudProductos/editar/'+${producto.id}" class="btn btn-secondary btn">Editar</a>
                    <a th:text="Eliminar" th:if="${usuario != null and usuario.usuario == 'admin'}" th:href="'/crudProductos/eliminar/'+${producto.id}" class="btn btn-danger btn">Eliminar</a>

                </td>
            </tr>
            </tbody>

        </table>

        <nav>
            <ul class="pagination justify-content-center">

                <li class="page-item"
                    th:each="i : ${#numbers.sequence(1, totalPaginas)}">

                    <a class="page-link"
                       th:href="@{/listarProductos(pagina=${i})}"
                       th:text="${i}">
                    </a>

                </li>

            </ul>
        </nav>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
