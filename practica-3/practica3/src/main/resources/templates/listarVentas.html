<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo}">Ventas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-light bg-light border-bottom">
    <div class="container">

        <ul class="nav nav-underline ms-auto">

            <li class="nav-item">
                <a class="nav-link" href="/">
                    Comprar
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="/crudProductos/listarVentas" th:if="${usuario != null and usuario.usuario == 'admin'}">
                    Ventas Realizadas
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="/" th:if="${usuario != null and usuario.usuario == 'admin'}">
                    Administrar Productos
                </a>
            </li>

            <li class="nav-item" >
                <a class="nav-link" href="/carroCompra/ver">
                    Carrito (<span th:text="${cantidad}"></span>)
                </a>
            </li>

            <li class="nav-item" th:if="${usuario == null}">
                <a class="nav-link" href="/login">
                    Iniciar Sesión
                </a>
            </li>

            <li class="nav-item" th:if="${usuario != null and usuario.usuario == 'admin'}">
                <a class="nav-link text-danger" href="/logout">
                    Cerrar Sesión
                </a>
            </li>
        </ul>

    </div>
</nav>

<div class="py-5 text-center border-bottom">
    <h2 class="fst-italic fw-bold">Listado de ventas</h2>
</div>

<div class="container" th:each="venta : ${listaVentas}">

    <div class="card">
        <div class="card-header">
            <h4 th:text="${venta.nombreCliente} + ' ' + ${#dates.format(venta.fechaCompra, 'dd/MM/yyyy')}"></h4>
        </div>
        <div class="card-body">
            <table class="table table-striped">

                <thead>
                <tr>
                    <th>Producto</th>
                    <th>Precio</th>
                    <th>Cantidad</th>
                    <th>Subtotal</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="detalle : ${venta.listaProductos}">
                    <td th:text="${detalle.producto.nombre}"></td>
                    <td th:text="${detalle.producto.precio}"></td>
                    <td th:text="${detalle.cantidad}"></td>
                    <td th:text="${detalle.producto.precio * detalle.cantidad}"></td>


                </tr>

                <tr>
                    <td colspan="3" class="text-end fw-bold">
                        Total:
                    </td>

                    <td class="fw-bold" th:text="${venta.calcularTotalProductosVenta()}"></td>

                    <td></td>
                </tr>

                </tbody>

            </table>

        </div>
    </div>


</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
