<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo}">Visualizar Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<nav class="navbar navbar-light bg-light border-bottom">
    <div class="container">

        <ul class="nav nav-underline ms-auto">

            <li class="nav-item">
                <a class="nav-link" href="/">Comprar</a>
            </li>

            <li class="nav-item">
                <a class="nav-link"
                   href="/crudProductos/listarVentas"
                   th:if="${usuario != null and usuario.usuario == 'admin'}">
                    Ventas Realizadas
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link"
                   href="/"
                   th:if="${usuario != null and usuario.usuario == 'admin'}">
                    Administrar Productos
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="/carroCompra/ver">
                    Carrito (<span th:text="${cantidad}"></span>)
                </a>
            </li>

            <li class="nav-item" th:if="${usuario == null}">
                <a class="nav-link" href="/login">
                    Iniciar Sesión
                </a>
            </li>

            <li class="nav-item" th:if="${usuario != null}">
                <a class="nav-link text-danger" href="/logout">
                    Cerrar Sesión
                </a>
            </li>

        </ul>

    </div>
</nav>

<div class="py-5 text-center border-bottom">
    <h2 class="fst-italic fw-bold">Visualización del Producto</h2>
</div>

<div class="container mt-4">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow">

                <div class="card-header text-center">
                    <h3 th:text="${producto.nombre}"></h3>
                </div>

                <div class="card-body">

                    <div class="row mb-4">

                        <div class="col-md-6 mb-3"
                             th:each="foto : ${producto.fotos}">

                            <img class="img-fluid rounded border"
                                 style="height:300px;width:100%;object-fit:contain"
                                 th:src="'data:' + ${foto.mimeType} + ';base64,' + ${foto.fotoBase64}">

                        </div>

                    </div>

                    <h5>Descripción</h5>
                    <p th:text="${producto.descripcionProducto}"></p>
                    <hr>

                    <h4>Comentarios</h4>

                    <div th:each="comentario : ${producto.comentarios}">
                        <div class="card mb-2" th:if="${comentario.habilitado}">
                        <div class="card-body">
                            <h6>
                                <strong th:text="${comentario.usuario}"></strong>
                            </h6>

                            <p class="mb-0" th:text="${comentario.texto}"></p>

                            <form method="post" th:if="${usuario != null and usuario.usuario == 'admin'}"
                                  th:action="'/crudProductos/comentario/eliminar/' + ${comentario.id}">

                                <button type="submit" class="btn btn-danger">Eliminar comentario</button>

                            </form>

                        </div>
                    </div>

                    </div>

                    <hr>

                    <div th:if="${usuario == null}"
                         class="alert alert-warning"
                         role="alert">
                        Es necesario iniciar sesión para agregar un comentario.
                        <a href="/login" class="alert-link">
                            Iniciar sesión
                        </a>

                    </div>

                    <div th:if="${usuario != null}">
                        <h5>Agregar comentario</h5>
                        <form method="post" th:action="@{'/producto/' + ${producto.id} + '/comentario'}">
                            <div class="mb-3">

                                <label class="form-label">Comentario</label>

                                <textarea class="form-control"
                                          name="texto"
                                          rows="3">
                                </textarea>

                            </div>

                            <button type="submit" class="btn btn-primary">
                                Comentar
                            </button>

                        </form>

                    </div>


                    <div class="row">

                        <div class="col-md-9">
                            <a href="/listarProductos" class="btn btn-secondary">Volver</a>
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
