<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo}">Producto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="d-flex justify-content-center align-items-center vh-100 bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header fw-bold text-center"
             th:text="${titulo}">
        </div>

        <div class="card-body">

            <form method="post" th:attr="action=${accion}">

                <input type="hidden"
                       name="id"
                       th:value="${producto != null ? producto.id : ''}">

                <div class="mb-3">
                    <label class="form-label">Nombre </label>
                    <input type="text" name="nombre" class="form-control"
                           th:value="${producto != null ? producto.nombre : ''}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Precio </label>
                    <input type="number" min="0" name="precio" class="form-control"
                           th:value="${producto != null ? producto.precio : ''}">

                </div>

                <button type="submit" class="btn btn-success">Guardar</button>

                <a href="/crudProductos/" class="btn btn-danger">Cancelar</a>

            </form>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
