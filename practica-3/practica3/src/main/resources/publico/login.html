<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="d-flex justify-content-center align-items-center vh-100 bg-light">

<div class="border-top">
    <div class="card text-center w-100">
        <div class="card-header text-center fw-bold">
            Login
        </div>

        <div class="card-body shadow">
            <form method="post" action="/procesar-login">

                <div class="row g-5  mb-4">
                    <div class="col-3">
                        <label class="form-label">Usuario:</label>
                    </div>
                    <div class="col-auto">
                        <input type="text" name="usuario" class="form-control">
                    </div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-auto">
                        <label for="inputPassword6" class="col-form-label">Contraseña:</label>
                    </div>
                    <div class="col-auto">
                        <input type="password" id="inputPassword6" name="password" class="form-control" aria-describedby="passwordHelpInline">
                    </div>
                </div>

                <input class="btn btn-primary" type="submit" value="Submit">

            </form>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
