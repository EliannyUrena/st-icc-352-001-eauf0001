<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo}">Carrito</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-light bg-light border-bottom">
    <div class="container">

        <ul class="nav nav-underline ms-auto">

            <li class="nav-item">
                <a class="nav-link" href="/">
                    Comprar
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="/crudProductos/listarVentas">
                    Ventas Realizadas
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="/login">
                    Administrar Productos
                </a>
            </li>

            <li class="nav-item" >
                <a class="nav-link" href="/carroCompra/ver">
                    Carrito (<span th:text="${cantidad}"></span>)
                </a>
            </li>

            <li class="nav-item" th:if="${usuarioEsAdmin}">
                <a class="nav-link text-danger" href="/logout">
                    Cerrar Sesión
                </a>
            </li>
        </ul>

    </div>
</nav>

<div class="container">

    <div class="py-5 text-center border-bottom">
        <h2 class="fst-italic fw-bold">Carrito de Compra</h2>
    </div>

    <table class="table table-striped">

        <thead>
        <tr>
            <th>Producto</th>
            <th>Precio</th>
            <th>Cantidad</th>
            <th>Subtotal</th>
            <th>Acción</th>
        </tr>
        </thead>

        <tbody>


        <tr th:each="detalle : ${carroCompra}">
            <td th:text="${detalle.producto.nombre}"></td>
            <td th:text="${detalle.producto.precio}"></td>
            <td th:text="${detalle.cantidad}"></td>
            <td th:text="${detalle.producto.precio * detalle.cantidad}"></td>

            <td>
                <a th:href="'/carroCompra/eliminar/' + ${detalle.producto.id}"
                   class="btn btn-danger btn-sm">
                    Eliminar
                </a>
            </td>
        </tr>

        <tr>
            <td colspan="3" class="text-end fw-bold">
                Total:
            </td>

            <td class="fw-bold" th:text="${total}"></td>

            <td></td>
        </tr>

        </tbody>

    </table>

    <div class="card mt-4">

        <div class="card-header fw-bold">
            Datos del cliente
        </div>

        <div class="card-body">

            <form method="post" action="/carroCompra/procesar" >

                <div class="mb-3">
                    <label class="form-label">
                        Nombre del Cliente
                    </label>

                    <input type="text"
                           name="nombreCliente"
                           class="form-control"
                           required>

                    <div class="text-center mt-3">

                        <button type="submit"
                                class="btn btn-success btn-sm">
                            Procesar Compra
                        </button>

                        <a href="/carroCompra/limpiar"
                           class="btn btn-secondary btn-sm">
                            Limpiar Carro Compra
                        </a>

                    </div>


                </div>


            </form>

        </div>


    </div>





</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
